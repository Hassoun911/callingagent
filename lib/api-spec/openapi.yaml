openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Call Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: phone-numbers
    description: Phone number management
  - name: contacts
    description: CRM contacts
  - name: companies
    description: CRM companies
  - name: call-logs
    description: Call logs and recordings
  - name: ai-voice
    description: AI voice configuration
  - name: dashboard
    description: Dashboard stats
  - name: sms
    description: SMS messages
  - name: campaigns
    description: Outbound cold calling campaigns
  - name: Auth
    description: Browser and mobile authentication endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /phone-numbers:
    get:
      operationId: listPhoneNumbers
      tags: [phone-numbers]
      summary: List all provisioned phone numbers
      responses:
        "200":
          description: List of phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhoneNumber"
    post:
      operationId: provisionPhoneNumber
      tags: [phone-numbers]
      summary: Provision a new phone number from Twilio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneNumberInput"
      responses:
        "201":
          description: Provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumber"

  /phone-numbers/search:
    get:
      operationId: searchAvailableNumbers
      tags: [phone-numbers]
      summary: Search available Twilio phone numbers
      parameters:
        - name: areaCode
          in: query
          schema:
            type: ["string", "null"]
        - name: contains
          in: query
          schema:
            type: ["string", "null"]
        - name: country
          in: query
          schema:
            type: string
            default: US
        - name: tollFree
          in: query
          schema:
            type: ["boolean", "null"]
        - name: city
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Available numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableNumber"

  /phone-numbers/{id}/twilio-status:
    get:
      operationId: getPhoneNumberTwilioStatus
      tags: [phone-numbers]
      summary: Fetch live Twilio status for a provisioned number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Twilio status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumberTwilioStatus"
        "404":
          description: Not found

  /phone-numbers/{id}:
    get:
      operationId: getPhoneNumber
      tags: [phone-numbers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumber"
    patch:
      operationId: updatePhoneNumber
      tags: [phone-numbers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneNumberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumber"
    delete:
      operationId: releasePhoneNumber
      tags: [phone-numbers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Released

  /phone-numbers/{id}/test-call:
    post:
      operationId: testCall
      tags: [phone-numbers]
      summary: Place a test call to verify forwarding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCallInput"
      responses:
        "200":
          description: Call initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCallResult"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List CRM contacts
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: companyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    patch:
      operationId: updateContact
      tags: [contacts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [companies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /call-logs:
    get:
      operationId: listCallLogs
      tags: [call-logs]
      summary: List call logs with optional filters
      parameters:
        - name: phoneNumberId
          in: query
          schema:
            type: ["integer", "null"]
        - name: direction
          in: query
          schema:
            type: ["string", "null"]
            enum: [inbound, outbound, null]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Call logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallLog"

  /call-logs/{id}:
    get:
      operationId: getCallLog
      tags: [call-logs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Call log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  /call-logs/{id}/notes:
    patch:
      operationId: updateCallLogNotes
      tags: [call-logs]
      summary: Update notes on a call log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes:
                  type: ["string", "null"]
      responses:
        "200":
          description: Updated call log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  /call-logs/{id}/recording:
    get:
      operationId: getRecordingUrl
      tags: [call-logs]
      summary: Get a signed recording URL for a call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recording URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingUrl"

  /ai-voice/config:
    get:
      operationId: getAiVoiceConfig
      tags: [ai-voice]
      summary: Get global AI voice configuration
      responses:
        "200":
          description: AI voice config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiVoiceConfig"
    patch:
      operationId: updateAiVoiceConfig
      tags: [ai-voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiVoiceConfigUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiVoiceConfig"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-calls:
    get:
      operationId: getRecentCalls
      tags: [dashboard]
      summary: Get recent call activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentCallItem"

  /sms:
    get:
      operationId: listSmsMessages
      tags: [sms]
      summary: List SMS messages
      parameters:
        - name: phoneNumberId
          in: query
          schema:
            type: integer
        - name: direction
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of SMS messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmsMessage"

  /sms/send:
    post:
      operationId: sendSms
      tags: [sms]
      summary: Send an outbound SMS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSmsBody"
      responses:
        "200":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsMessage"
        "400":
          description: Validation error
        "500":
          description: Send failed

  /sms/unread-count:
    get:
      operationId: getSmsUnreadCount
      tags: [sms]
      summary: Get count of unread inbound SMS messages
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/contacts:
    get:
      operationId: listCampaignContacts
      tags: [campaigns]
      summary: List contacts for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignContact"
    post:
      operationId: addCampaignContact
      tags: [campaigns]
      summary: Add a single contact to a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContact"

  /campaigns/{id}/contacts/import:
    post:
      operationId: importCampaignContacts
      tags: [campaigns]
      summary: Bulk import contacts from pasted text
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignContactBulkImport"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported, skipped]
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer

  /campaigns/calendar:
    get:
      operationId: getCampaignCalendar
      tags: [campaigns]
      summary: Get all calendar events (callbacks and hot leads) across campaigns
      responses:
        "200":
          description: List of calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /campaigns/{id}/contacts/{contactId}:
    patch:
      operationId: updateCampaignContact
      tags: [campaigns]
      summary: Update a campaign contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContact"
    delete:
      operationId: deleteCampaignContact
      tags: [campaigns]
      summary: Delete a campaign contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/start:
    post:
      operationId: startCampaign
      tags: [campaigns]
      summary: Start or resume dialing a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [queued]
                properties:
                  queued:
                    type: integer

  /campaigns/{id}/pause:
    post:
      operationId: pauseCampaign
      tags: [campaigns]
      summary: Pause a running campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /campaigns/{id}/contacts/{contactId}/call:
    post:
      operationId: callCampaignContact
      tags: [campaigns]
      summary: Manually call a single campaign contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /twilio/voice:
    post:
      operationId: twilioVoiceWebhook
      tags: [phone-numbers]
      summary: Twilio voice webhook handler
      responses:
        "200":
          description: TwiML response
          content:
            application/xml:
              schema:
                type: string

  /twilio/status:
    post:
      operationId: twilioStatusWebhook
      tags: [phone-numbers]
      summary: Twilio call status callback
      responses:
        "200":
          description: OK

  /twilio/recording:
    post:
      operationId: twilioRecordingWebhook
      tags: [phone-numbers]
      summary: Twilio recording callback
      responses:
        "200":
          description: OK

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    PhoneNumber:
      type: object
      required: [id, number, friendlyName, callerIdName, forwardTo, ringCount, answerMode, isActive, createdAt]
      properties:
        id:
          type: integer
        number:
          type: string
        twilioSid:
          type: ["string", "null"]
        friendlyName:
          type: string
        callerIdName:
          type: string
        companyId:
          type: ["integer", "null"]
        forwardTo:
          type: ["string", "null"]
        ringCount:
          type: integer
        answerMode:
          type: string
          enum: [forward, ai_voice, voicemail, reject]
        forwardCallerId:
          type: string
          enum: [caller, line]
        callerExperience:
          type: string
          enum: [ringing, connecting, hold_message, greeting, greeting_name]
        callScreen:
          type: boolean
        callScreenFallback:
          type: string
          enum: [ai_voice, voicemail]
        forwardNoAnswerAction:
          type: string
          enum: [personal_voicemail, voicemail, ai_voice]
        holdMessage:
          type: ["string", "null"]
        aiSystemPrompt:
          type: ["string", "null"]
        aiVoice:
          type: ["string", "null"]
        aiLanguage:
          type: ["string", "null"]
        aiGreeting:
